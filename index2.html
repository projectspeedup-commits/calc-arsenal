<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор для менеджера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#F5F5F7] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Встроенные иконки ---
        const IconBase = ({ className, viewBox = "0 0 24 24", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox={viewBox} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Calculator = ({className}) => <IconBase className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="16" x2="16.01" y1="18" y2="18"/></IconBase>;
        const Hexagon = ({className}) => <IconBase className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></IconBase>;
        const Circle = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/></IconBase>;
        const ArrowRight = ({className}) => <IconBase className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;
        const ArrowLeftRight = ({className}) => <IconBase className={className}><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></IconBase>;
        const Package = ({className}) => <IconBase className={className}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></IconBase>;
        const Scale = ({className}) => <IconBase className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></IconBase>;
        const Ruler = ({className}) => <IconBase className={className}><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/><path d="m17.5 15.5 2-2"/></IconBase>;
        const Banknote = ({className}) => <IconBase className={className}><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></IconBase>;
        const Info = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>;
        const Briefcase = ({className}) => <IconBase className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconBase>;
        const AlertTriangle = ({className}) => <IconBase className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconBase>;
        const RotateCcw = ({className}) => <IconBase className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;

        function generateRoundData(start, end, step, rawSizes) {
            const result = [];
            for (let target = start; target <= end; target += step) {
                const roundedTarget = Math.round(target * 10) / 10;
                rawSizes.forEach(raw => {
                    if (raw >= roundedTarget + 1) {
                        const coef = Math.pow(raw / roundedTarget, 2);
                        result.push({ target: roundedTarget, raw: raw, coef: parseFloat(coef.toFixed(3)) });
                    }
                });
            }
            return result;
        }

        const ROUND_DATA = [
            { target: 10, raw: 12, coef: 1.440 }, { target: 10.5, raw: 12, coef: 1.306 }, { target: 11, raw: 12, coef: 1.190 }, { target: 11.5, raw: 14, coef: 1.482 },
            { target: 12, raw: 14, coef: 1.361 }, { target: 12.5, raw: 14, coef: 1.254 }, { target: 12.5, raw: 15, coef: 1.440 }, { target: 13, raw: 14, coef: 1.160 },
            { target: 13, raw: 15, coef: 1.331 }, { target: 13.5, raw: 15, coef: 1.235 }, { target: 13.5, raw: 16, coef: 1.405 }, { target: 14, raw: 15, coef: 1.148 },
            { target: 14, raw: 16, coef: 1.306 }, { target: 14.5, raw: 16, coef: 1.218 }, { target: 15, raw: 16, coef: 1.138 }, { target: 15.5, raw: 18, coef: 1.349 },
            { target: 16, raw: 18, coef: 1.266 }, { target: 16.5, raw: 18, coef: 1.190 }, { target: 16.5, raw: 19, coef: 1.326 }, { target: 17, raw: 18, coef: 1.121 },
            { target: 17, raw: 19, coef: 1.249 }, { target: 17.5, raw: 19, coef: 1.179 }, { target: 17.5, raw: 20, coef: 1.306 }, { target: 18, raw: 20, coef: 1.235 },
            { target: 18.5, raw: 20, coef: 1.169 }, { target: 19, raw: 18, coef: 1.114 }, { target: 19, raw: 22, coef: 1.273 }, { target: 19.5, raw: 22, coef: 1.273 },
            { target: 20, raw: 19, coef: 1.108 }, { target: 20, raw: 22, coef: 1.210 }, { target: 20.5, raw: 22, coef: 1.152 }, { target: 21, raw: 22, coef: 1.098 },
            { target: 21.5, raw: 24, coef: 1.246 }, { target: 22, raw: 24, coef: 1.190 }, { target: 22.5, raw: 24, coef: 1.138 }, { target: 22.5, raw: 25, coef: 1.235 },
            { target: 23, raw: 24, coef: 1.089 }, { target: 23.5, raw: 25, coef: 1.132 }, { target: 23.5, raw: 26, coef: 1.224 }, { target: 24, raw: 25, coef: 1.085 },
            { target: 24, raw: 26, coef: 1.174 }, { target: 24.5, raw: 26, coef: 1.126 }, { target: 25, raw: 23, coef: 1.181 }, { target: 25, raw: 26, coef: 1.082 },
            { target: 25.5, raw: 28, coef: 1.206 }, { target: 26, raw: 28, coef: 1.160 }, { target: 26.5, raw: 28, coef: 1.116 }, { target: 27, raw: 28, coef: 1.075 },
            { target: 27.5, raw: 30, coef: 1.190 }, { target: 28, raw: 30, coef: 1.148 }, { target: 28.5, raw: 30, coef: 1.108 }, { target: 29, raw: 30, coef: 1.070 },
            { target: 29.5, raw: 32, coef: 1.177 }, { target: 30, raw: 32, coef: 1.138 }, { target: 43, raw: 45, coef: 1.095 }, { target: 43.5, raw: 45, coef: 1.070 },
            { target: 44, raw: 45, coef: 1.046 }, { target: 43.5, raw: 46, coef: 1.118 }, { target: 44, raw: 46, coef: 1.093 }, { target: 44.5, raw: 46, coef: 1.069 },
            { target: 45, raw: 46, coef: 1.045 }, { target: 45.5, raw: 48, coef: 1.113 }, { target: 46, raw: 48, coef: 1.089 }, { target: 46.5, raw: 48, coef: 1.066 },
            { target: 47, raw: 48, coef: 1.043 }, { target: 47.5, raw: 50, coef: 1.108 }, { target: 48, raw: 50, coef: 1.085 }, { target: 48.5, raw: 50, coef: 1.063 },
            { target: 49, raw: 50, coef: 1.041 }, { target: 49.5, raw: 52, coef: 1.104 }, { target: 50, raw: 52, coef: 1.082 },
            ...generateRoundData(50.5, 62.0, 0.5, [52, 54, 55, 56, 58, 60, 62, 63, 64])
        ];

        const HEX_DATA = [
            { target: 10, raw: 12, coef: 1.226 }, { target: 11, raw: 13, coef: 1.231 }, { target: 12, raw: 14, coef: 1.226 }, { target: 13, raw: 15, coef: 1.225 },
            { target: 14, raw: 16, coef: 1.226 }, { target: 15, raw: 17, coef: 1.226 }, { target: 16, raw: 19, coef: 1.226 }, { target: 17, raw: 20, coef: 1.226 },
            { target: 18, raw: 21, coef: 1.226 }, { target: 19, raw: 22, coef: 1.226 }, { target: 20, raw: 23, coef: 1.226 }, { target: 21, raw: 24, coef: 1.226 },
            { target: 22, raw: 26, coef: 1.226 }, { target: 24, raw: 28, coef: 1.226 }, { target: 25, raw: 29, coef: 1.226 }, { target: 26, raw: 30, coef: 1.226 },
            { target: 27, raw: 31, coef: 1.226 }, { target: 28, raw: 33, coef: 1.226 }, { target: 30, raw: 35, coef: 1.226 }, { target: 32, raw: 37, coef: 1.226 },
            { target: 34, raw: 40, coef: 1.226 }, { target: 36, raw: 42, coef: 1.226 }, { target: 38, raw: 44, coef: 1.226 }, { target: 40, raw: 47, coef: 1.225 },
            { target: 41, raw: 48, coef: 1.226 }, { target: 42, raw: 49, coef: 1.226 }, { target: 45, raw: 52, coef: 1.225 }, { target: 46, raw: 53, coef: 1.226 },
            { target: 48, raw: 56, coef: 1.223 }, { target: 50, raw: 58, coef: 1.226 }, { target: 53, raw: 62, coef: 1.225 }, { target: 55, raw: 64, coef: 1.226 },
            { target: 56, raw: 65, coef: 1.226 }, { target: 60, raw: 70, coef: 1.226 }, { target: 63, raw: 73, coef: 1.226 },
        ];

        function App() {
            const [profileType, setProfileType] = useState('round');
            const [selectedTarget, setSelectedTarget] = useState('');
            const [selectedRaw, setSelectedRaw] = useState('');
            const [orderWeight, setOrderWeight] = useState('');
            
            const [lengthInput, setLengthInput] = useState({ value: '6000', source: 'raw' });
            const [orderedLength, setOrderedLength] = useState('6000');
            
            const [rawPrice, setRawPrice] = useState('');
            const [sellPrice, setSellPrice] = useState('');
            const [scrapPrice, setScrapPrice] = useState('');

            const activeData = profileType === 'round' ? ROUND_DATA : HEX_DATA;

            const targetOptions = useMemo(() => {
                const targets = activeData.map(item => item.target);
                return [...new Set(targets)].sort((a, b) => a - b);
            }, [activeData]);

            const rawOptions = useMemo(() => {
                if (!selectedTarget) return [];
                return activeData
                .filter(item => item.target === Number(selectedTarget))
                .map(item => item.raw)
                .sort((a, b) => a - b);
            }, [selectedTarget, activeData]);

            const currentCoefficient = useMemo(() => {
                if (!selectedTarget || !selectedRaw) return null;
                const match = activeData.find(
                item => item.target === Number(selectedTarget) && item.raw === Number(selectedRaw)
                );
                return match ? match.coef : null;
            }, [selectedTarget, selectedRaw, activeData]);

            useEffect(() => {
                setSelectedTarget('');
                setSelectedRaw('');
            }, [profileType]);

            useEffect(() => {
                if (rawOptions.length === 1) {
                setSelectedRaw(rawOptions[0].toString());
                } else if (rawOptions.length > 0 && !rawOptions.includes(Number(selectedRaw))) {
                setSelectedRaw('');
                }
            }, [selectedTarget, rawOptions]);

            const requiredWeight = useMemo(() => {
                if (!orderWeight || !currentCoefficient) return null;
                const val = Number(orderWeight) * currentCoefficient;
                return isNaN(val) ? null : val.toFixed(2);
            }, [orderWeight, currentCoefficient]);

            const currentDrawCoef = useMemo(() => {
                if (!selectedTarget || !selectedRaw) return null;
                if (profileType === 'round') {
                return Math.pow(Number(selectedRaw), 2) / Math.pow(Number(selectedTarget), 2);
                } else {
                return (Number(selectedTarget) === 48 && Number(selectedRaw) === 56) ? 1.22 : 1.23;
                }
            }, [selectedTarget, selectedRaw, profileType]);

            const displayedRawLength = lengthInput.source === 'raw' 
                ? lengthInput.value 
                : (lengthInput.value && currentDrawCoef ? (Number(lengthInput.value) / currentDrawCoef).toFixed(1) : '');

            const displayedTargetLength = lengthInput.source === 'target' 
                ? lengthInput.value 
                : (lengthInput.value && currentDrawCoef ? (Number(lengthInput.value) * currentDrawCoef).toFixed(1) : '');

            const piecesPerBar = useMemo(() => {
                if (displayedTargetLength && orderedLength) {
                const target = Number(displayedTargetLength);
                const order = Number(orderedLength);
                return (order > 0 && target >= order) ? Math.floor(target / order) : 0;
                }
                return 0;
            }, [displayedTargetLength, orderedLength]);

            const remnantLength = useMemo(() => {
                if (displayedTargetLength && orderedLength) {
                const target = Number(displayedTargetLength);
                const order = Number(orderedLength);
                if (isNaN(target) || isNaN(order)) return '';
                if (order > target) return (target - order).toFixed(1);
                return (target - (order * piecesPerBar)).toFixed(1);
                }
                return '';
            }, [displayedTargetLength, orderedLength, piecesPerBar]);

            const optimalLengths = useMemo(() => {
                if (!displayedTargetLength) return [];
                const target = Number(displayedTargetLength);
                if (isNaN(target) || target <= 0) return [];
                
                const options = [];
                for (let i = 1; i <= 20; i++) {
                    const optLen = Math.floor(target / i) - 5;
                    if (optLen >= 2500 && optLen <= 6500) {
                        options.push({ pieces: i, length: optLen });
                    }
                }
                
                const currentOrder = Number(orderedLength);
                if (!isNaN(currentOrder) && currentOrder > 0) {
                    options.sort((a, b) => Math.abs(a.length - currentOrder) - Math.abs(b.length - currentOrder));
                }

                return options.slice(0, 4); 
            }, [displayedTargetLength, orderedLength]);

            const orderedBarWeight = useMemo(() => {
                if (!orderedLength || Number(orderedLength) <= 0 || !selectedTarget) return null;
                const lengthMm = Number(orderedLength);
                const sizeMm = Number(selectedTarget);
                const area = profileType === 'round' 
                ? (Math.PI * Math.pow(sizeMm, 2)) / 4 
                : (Math.sqrt(3) / 2) * Math.pow(sizeMm, 2);
                const weightKg = area * lengthMm * 0.00000785;
                return { tons: (weightKg / 1000).toFixed(5), kg: weightKg.toFixed(2) };
            }, [orderedLength, selectedTarget, profileType]);

            const piecesPerTon = useMemo(() => {
                if (!orderedBarWeight || Number(orderedBarWeight.kg) === 0) return 0;
                return Math.floor(1000 / Number(orderedBarWeight.kg));
            }, [orderedBarWeight]);

            const totalPiecesInOrder = useMemo(() => {
                if (!orderWeight || !orderedBarWeight || Number(orderedBarWeight.kg) === 0) return 0;
                return Math.floor((Number(orderWeight) * 1000) / Number(orderedBarWeight.kg));
            }, [orderWeight, orderedBarWeight]);

            const remnantWeight = useMemo(() => {
                if (!remnantLength || Number(remnantLength) <= 0 || !selectedTarget) return null;
                const lengthMm = Number(remnantLength);
                const sizeMm = Number(selectedTarget);
                const area = profileType === 'round' 
                ? (Math.PI * Math.pow(sizeMm, 2)) / 4 
                : (Math.sqrt(3) / 2) * Math.pow(sizeMm, 2);
                const weightKg = area * lengthMm * 0.00000785;
                return { tons: (weightKg / 1000).toFixed(5), kg: weightKg.toFixed(2) };
            }, [remnantLength, selectedTarget, profileType]);

            const remnantValue = useMemo(() => {
                if (!remnantWeight || !rawPrice) return null;
                const val = Number(remnantWeight.tons) * Number(rawPrice);
                return isNaN(val) ? null : val.toFixed(2);
            }, [remnantWeight, rawPrice]);

            const advancedRemnantStats = useMemo(() => {
                if (!remnantLength || Number(remnantLength) <= 0 || !orderedLength || Number(orderedLength) <= 0 || piecesPerBar === 0) return null;
                const ratio = Number(remnantLength) / (Number(orderedLength) * piecesPerBar);
                const kgPerTon = ratio * 1000;
                const tonsPerTon = ratio;
                const valuePerTon = rawPrice ? ratio * Number(rawPrice) : null;
                let orderScrapTons = 0, orderScrapValue = null;
                
                if (orderWeight && Number(orderWeight) > 0) {
                orderScrapTons = ratio * Number(orderWeight);
                if (rawPrice) orderScrapValue = orderScrapTons * Number(rawPrice);
                }
                
                return {
                kgPerTon: kgPerTon.toFixed(1), 
                tonsPerTon: tonsPerTon.toFixed(3),
                valuePerTon: valuePerTon !== null ? valuePerTon.toFixed(2) : null,
                orderScrapTons: orderScrapTons.toFixed(3),
                orderScrapValue: orderScrapValue !== null ? orderScrapValue.toFixed(2) : null
                };
            }, [remnantLength, orderedLength, rawPrice, orderWeight, piecesPerBar]);

            const commercialStats = useMemo(() => {
                if (!sellPrice || !rawPrice || !orderWeight) return null;
                const sPrice = Number(sellPrice);
                const rPrice = Number(rawPrice);
                const scPrice = Number(scrapPrice) || 0;
                const weight = Number(orderWeight);
                if (isNaN(sPrice) || isNaN(rPrice) || isNaN(weight)) return null;

                const lossesPerTon = advancedRemnantStats && advancedRemnantStats.valuePerTon ? Number(advancedRemnantStats.valuePerTon) : 0;
                const scrapTonsPerTon = advancedRemnantStats && advancedRemnantStats.tonsPerTon ? Number(advancedRemnantStats.tonsPerTon) : 0;
                
                const scrapRevenuePerTon = scrapTonsPerTon * scPrice;
                const netLossesPerTon = lossesPerTon - scrapRevenuePerTon;

                const profitPerTon = sPrice - rPrice - netLossesPerTon;
                const profitTotal = profitPerTon * weight;
                
                return {
                lossesPerTon,
                scrapRevenuePerTon,
                netLossesPerTon,
                profitPerTon, 
                profitTotal,
                sellTotal: sPrice * weight,
                rawTotal: rPrice * weight,
                lossesTotal: lossesPerTon * weight,
                scrapRevenueTotal: scrapRevenuePerTon * weight,
                netLossesTotal: netLossesPerTon * weight,
                isPositive: profitTotal >= 0
                };
            }, [sellPrice, rawPrice, scrapPrice, orderWeight, advancedRemnantStats]);

            const formatCurrency = (value) => {
                if (value === null || value === undefined || isNaN(Number(value))) return '0,00';
                return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(value));
            };

            const formatInputValue = (value) => {
                if (!value) return '';
                const parts = value.toString().split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
                return parts.join('.');
            };

            const handleNumericInput = (e, setter) => {
                let val = e.target.value.replace(/\s/g, '').replace(/,/g, '.');
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                setter(val);
                }
            };

            const handleReset = () => {
                setProfileType('round'); setSelectedTarget(''); setSelectedRaw('');
                setOrderWeight(''); setLengthInput({ value: '6000', source: 'raw' });
                setOrderedLength('6000'); setRawPrice(''); setSellPrice(''); setScrapPrice('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen py-6 sm:py-12 px-4 sm:px-6 font-sans text-gray-900">
                <div className="max-w-4xl mx-auto space-y-6 sm:space-y-8">
                    
                    {/* Шапка */}
                    <header className="bg-white/80 backdrop-blur-xl sticky top-2 sm:top-4 z-50 rounded-[28px] px-5 py-4 sm:px-8 sm:py-5 shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-3 sm:gap-4 text-center sm:text-left">
                            <div className="w-12 h-12 bg-blue-500 rounded-[18px] flex items-center justify-center shadow-sm shrink-0 mx-auto sm:mx-0">
                            <Calculator className="w-6 h-6 text-white" />
                            </div>
                            <div>
                            <h1 className="text-lg sm:text-xl font-semibold tracking-tight text-gray-900 leading-tight">
                                Калькулятор для менеджеров
                            </h1>
                            <p className="text-xs sm:text-sm font-medium text-gray-500 mt-0.5">
                                Имени В.В. Швеца
                            </p>
                            </div>
                        </div>
                        <button 
                            onClick={handleReset} 
                            className="w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-full transition-colors font-medium text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 active:scale-95"
                        >
                            <RotateCcw className="w-4 h-4" />
                            Сбросить
                        </button>
                    </header>

                    {/* Секция 1: Основные параметры */}
                    <section className="bg-white rounded-[32px] p-5 sm:p-8 lg:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50">
                    
                        {/* iOS Style Segmented Control */}
                        <div className="bg-[#E3E3E8]/60 p-1 rounded-[14px] flex max-w-sm mx-auto mb-8 sm:mb-10">
                            <button 
                            onClick={() => setProfileType('round')} 
                            className={`flex-1 py-2 px-3 rounded-[10px] flex items-center justify-center gap-2 text-[13px] sm:text-sm font-semibold transition-all duration-200 ${profileType === 'round' ? 'bg-white text-gray-900 shadow-[0_3px_8px_rgba(0,0,0,0.12)]' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                            <Circle className="w-4 h-4" /> Круг
                            </button>
                            <button 
                            onClick={() => setProfileType('hex')} 
                            className={`flex-1 py-2 px-3 rounded-[10px] flex items-center justify-center gap-2 text-[13px] sm:text-sm font-semibold transition-all duration-200 ${profileType === 'hex' ? 'bg-white text-gray-900 shadow-[0_3px_8px_rgba(0,0,0,0.12)]' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                            <Hexagon className="w-4 h-4" /> Шестигранник
                            </button>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6 items-end">
                            <div className="space-y-1.5">
                            <label className="block text-[13px] font-medium text-gray-500 ml-1 leading-tight">Готовый пруток (мм)</label>
                            <div className="relative">
                                <select 
                                value={selectedTarget} 
                                onChange={(e) => setSelectedTarget(e.target.value)} 
                                className="w-full bg-[#F5F5F7] border border-transparent text-gray-900 rounded-2xl px-4 h-14 text-base font-semibold outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none cursor-pointer"

                            </div>
                            <div className="flex justify-between items-start sm:items-center text-[#fca5a5] gap-2">
                                <span>- Потери на весь заказ:</span>
                                <span className="text-right whitespace-nowrap">{rawPrice && orderWeight ? `${formatCurrency(commercialStats.lossesTotal)} руб.` : '—'}</span>
                            </div>
                            {scrapPrice && Number(scrapPrice) > 0 && commercialStats.scrapRevenueTotal > 0 && (
                            <div className="flex justify-between items-center text-[#34d399]">
                                <span>+ Возврат от продажи лома (весь заказ):</span>
                                <span className="text-right whitespace-nowrap">{formatCurrency(commercialStats.scrapRevenueTotal)} руб.</span>
                            </div>
                            )}
                            <div className="pt-5 mt-3 border-t border-gray-700/50 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                                <div>
                                <span className="font-bold text-white text-base sm:text-xl uppercase tracking-wider block">Итоговая маржа без НДС:</span>
                                <div className="text-[10px] sm:text-xs text-gray-400 mt-1">
                                    ({formatCurrency(commercialStats.sellTotal)} − {formatCurrency(commercialStats.rawTotal)} − {formatCurrency(commercialStats.lossesTotal)}{scrapPrice && Number(scrapPrice) > 0 && commercialStats.scrapRevenueTotal > 0 ? ` + ${formatCurrency(commercialStats.scrapRevenueTotal)}` : ''})
                                </div>
                                </div>
                                <span className={`font-black text-3xl sm:text-4xl tracking-tight self-end sm:self-auto ${commercialStats.isPositive ? 'text-[#34d399]' : 'text-[#f87171]'}`}>
                                {commercialStats.isPositive ? '+' : ''}{formatCurrency(commercialStats.profitTotal)} руб.
                                </span>
                            </div>
                            </div>
                        </div>

                        {/* Блоки предупреждений и рекомендаций */}
                        <div className="space-y-3 sm:space-y-4 pt-4 sm:pt-6">
                            
                            {/* Рекомендация по ценообразованию */}
                            {commercialStats.netLossesPerTon > 0 && (
                            <div className="bg-[#fffdf0] border border-[#fde68a] p-4 sm:p-6 rounded-[20px] sm:rounded-[24px]">
                                <div className="flex items-start gap-3 sm:gap-4">
                                <Info className="w-5 h-5 sm:w-6 sm:h-6 text-[#d97706] mt-0.5 shrink-0" />
                                <div>
                                    <h5 className="text-[#92400e] font-bold text-[15px] sm:text-base mb-1.5 sm:mb-2">Рекомендация по ценообразованию</h5>
                                    <p className="text-[#b45309] text-[13px] sm:text-sm leading-relaxed mb-3 sm:mb-4">
                                    При текущем раскрое в себестоимость ложатся чистые потери от обрезков (с учетом продажи лома): <span className="font-bold text-[#92400e]">{formatCurrency(commercialStats.netLossesPerTon)} руб.</span> на каждую тонну продукции.
                                    </p>
                                    <p className="text-[#b45309] text-[13px] sm:text-sm leading-relaxed mb-2 sm:mb-3">
                                    Рекомендуемая продажная цена (для компенсации чистых потерь):
                                    </p>
                                    <div className="inline-block bg-white border border-[#fcd34d] px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl text-[#92400e] font-bold text-base sm:text-lg shadow-sm">
                                    {formatCurrency(Number(sellPrice) + Number(commercialStats.netLossesPerTon))} руб. / т
                                    </div>
                                </div>
                                </div>
                            </div>
                            )}

                            {/* Внимание: Низкая маржинальность */}
                            {commercialStats.profitPerTon > 0 && commercialStats.profitPerTon < 10000 && (
                            <div className="bg-[#1e0f13] border border-[#4c1d24] p-4 sm:p-6 rounded-[20px] sm:rounded-[24px] flex items-start gap-3 sm:gap-4">
                                <AlertTriangle className="w-5 h-5 sm:w-6 sm:h-6 text-[#f87171] shrink-0 mt-0.5" />
                                <div>
                                <h5 className="text-[#fca5a5] font-bold text-[15px] sm:text-base mb-1 sm:mb-1.5">Внимание: Низкая маржинальность!</h5>
                                <p className="text-[#fecaca]/80 text-[13px] sm:text-sm leading-relaxed">
                                    Маржинальная прибыль составляет менее 10 000 руб. на 1 тонну (текущая: {formatCurrency(commercialStats.profitPerTon)} руб.). Рекомендуется повысить продажную цену или оптимизировать длину раскроя для снижения потерь на обрезь.
                                </p>
                                </div>
                            </div>
                            )}
                            
                            {/* Внимание: Убыток */}
                            {commercialStats.profitPerTon <= 0 && rawPrice && sellPrice && (
                            <div className="bg-[#450a0a] border border-[#7f1d1d] p-4 sm:p-6 rounded-[20px] sm:rounded-[24px] flex items-start gap-3 sm:gap-4">
                                <AlertTriangle className="w-5 h-5 sm:w-6 sm:h-6 text-red-400 shrink-0 mt-0.5" />
                                <div>
                                <h5 className="text-red-300 font-bold text-[15px] sm:text-base mb-1 sm:mb-1.5">Внимание: Сделка убыточна!</h5>
                                <p className="text-red-200/80 text-[13px] sm:text-sm leading-relaxed">
                                    Сделка приносит убыток. Обязательно пересмотрите цену продажи или согласуйте с клиентом оптимальную мерную длину для устранения отходов.
                                </p>
                                </div>
                            </div>
                            )}
                        </div>

                        </div>
                    )}
                    </section>

                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
